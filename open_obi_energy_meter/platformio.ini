; OBI / heyOBI LoRa mini-gateway — any ESP32 + Semtech SX1262.
;
; Radio parameters are REVERSED from reader_v1.2.1 (see README.md / ../03-reverse-engineering/lora-protocol.md):
;   869.500 MHz | LoRa | BW 500 kHz | SF7 | CR 4/5 | preamble 12
;   explicit header | CRC on | IQ normal | sync word 0x1424 (0x12) | +22 dBm | TCXO 1.8 V
;
; Pick the env that matches your board (pins live in include/board_config.h):
;   pio run -e vision_master_e290 -t upload      # Heltec Vision Master E290 (ESP32-S3 + SX1262)
;   pio run -e ttgo_tbeam_sx1262  -t upload      # LILYGO T-Beam/T3 with SX1262
;   pio run -e xiao_esp32s3       -t upload      # Seeed XIAO ESP32S3 & Wio-SX1262 Kit (B2B)
;   pio run -e generic_esp32s3    -t upload      # your own wiring: edit board_config.h (OBI_BOARD_CUSTOM)

[env]
platform      = espressif32
framework     = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
; stamp include/fw_version.h (version + build target + git) before each build; auto-bumps version.txt
extra_scripts = pre:version.py
lib_deps =
    jgromes/RadioLib @ ^7.1.0
    tzapu/WiFiManager @ ^2.0.17
    knolleary/PubSubClient @ ^2.8

; Heltec Vision Master E290 / T190, WiFi LoRa 32 V3 (ESP32-S3, native USB)
[env:vision_master_e290]
board       = esp32-s3-devkitc-1
; Vision Master E290 has 8 MB flash — use the matching partition table so the
; e-paper driver (GxEPD2 + Adafruit GFX) fits alongside the gateway firmware.
board_upload.flash_size = 8MB
board_build.partitions  = default_8MB.csv
build_flags = -D OBI_BOARD_HELTEC_S3
              -D ARDUINO_USB_MODE=1
              -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    ${env.lib_deps}
    zinggjm/GxEPD2 @ ^1.5.3
    adafruit/Adafruit GFX Library @ ^1.11.9

; LILYGO T-Beam / T3 (classic ESP32 + SX1262)
[env:ttgo_tbeam_sx1262]
board       = ttgo-t-beam
build_flags = -D OBI_BOARD_TTGO_TBEAM_SX1262

; Generic ESP32-S3 + SX1262 — set your pins in board_config.h (OBI_BOARD_CUSTOM block)
[env:generic_esp32s3]
board       = esp32-s3-devkitc-1
build_flags = -D OBI_BOARD_CUSTOM
              -D ARDUINO_USB_MODE=1
              -D ARDUINO_USB_CDC_ON_BOOT=1

; Generic classic ESP32 + SX1262 — set your pins in board_config.h (OBI_BOARD_CUSTOM block)
[env:generic_esp32]
board       = esp32dev
build_flags = -D OBI_BOARD_CUSTOM

; Seeed Studio XIAO ESP32S3 & Wio-SX1262 Kit (ESP32-S3 + SX1262 via on-board B2B connector)
[env:xiao_esp32s3]
board       = seeed_xiao_esp32s3
build_flags = -D OBI_BOARD_XIAO_ESP32S3
              -D ARDUINO_USB_MODE=1
              -D ARDUINO_USB_CDC_ON_BOOT=1

; ---------------------------------------------------------------------------
; The ORIGINAL OBI/heyOBI gateway — ESP32-C3 + SX1262 (Ai-Thinker Ra-03SCH), pins reversed from stock
; firmware 1.2.1 (OBI_BOARD_OBI_C3 in board_config.h). The stock unit has a LOCKED bootloader
; (DIS_JTAG + DIS_DOWNLOAD_MODE burned), so you CANNOT flash it over UART/JTAG. This build is delivered
; through the cloud MQTT OTA path instead — build the app, then serve firmware.bin to the device:
;
;   pio run -e obi_gateway_c3                 # produces .pio/build/obi_gateway_c3/firmware.bin
;   python ../04-connect-your-own-cloud/tools/mqtts_server.py --ota-firmware \
;          .pio/build/obi_gateway_c3/firmware.bin      # pushes it on the device's next OTA poll
;
; The OTA image is written into whichever OTA slot the stock partition table defines (dual-OTA; the
; vendor's own image is ~1.5 MB, so the slots are >= 1.5 MB). Console stays on UART0 (GPIO20/21) — do NOT
; enable USB CDC: GPIO18/19 are used for the radio RST/DIO1, not USB. There is no reader image appended.
; A closed unit can be re-configured only via the case button (GPIO8): hold ~5 s to wipe WiFi/MQTT and
; reboot into the 'OBI-Gateway-Setup' captive portal.
[env:obi_gateway_c3]
board                 = esp32-c3-devkitm-1
board_build.partitions = min_spiffs.csv     ; dual-OTA, ~1.9 MB app slots (fits the stock >=1.5 MB slot)
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
build_flags = -D OBI_BOARD_OBI_C3
              -D OBI_FLASH_FORCE_DIO         ; board's flash is wired 2-line (DIO); force esp_flash off QIO or reads/NVS/OTA break
              -D ARDUINO_USB_CDC_ON_BOOT=0   ; keep the console on UART0 (GPIO20/21), free 18/19 for the radio
              -D ARDUINO_USB_MODE=0
